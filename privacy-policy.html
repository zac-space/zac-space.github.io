<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Privacy Policy</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
      background-color: #0d1117;
      color: white;
    }
    a {
      color: #58a6ff;
    }
  </style>
</head>

<body>

  <h1>BLEUJOY is no longer in operation.</h1>

  <p>
    For current services and policies, please refer to IZACWARES.
  </p>

  <p id="countdown">
    You will be redirected in 5 seconds...
  </p>

  <p>
    If not redirected,
    <a href="https://www.izacwares.com/privacy-policy">click here</a>.
  </p>

  <script>
    let seconds = 5;
    const countdownElement = document.getElementById("countdown");

    const interval = setInterval(() => {
      seconds--;
      countdownElement.innerText = "You will be redirected in " + seconds + " seconds...";

      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = "https://www.izacwares.com/privacy-policy";
      }
    }, 1000);
  </script>

</body>
</html>
